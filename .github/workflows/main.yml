name: OpenClaw Web Interface

on:
  workflow_dispatch: # Allows you to trigger the run manually

jobs:
  deploy-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Node 24 is highly recommended for OpenClaw

      - name: Install OpenClaw Globally
        run: npm install -g openclaw@latest

      - name: Add npm global bin to PATH
        # This ensures the 'openclaw' command is accessible to background processes
        run: echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Initialize OpenClaw Baseline
        # Writes the baseline local mode configs automatically
        run: openclaw setup --baseline --non-interactive

      - name: Configure OpenClaw & OpenRouter API Key
        run: |
          # Ensure gateway is configured correctly through CLI
          openclaw config set gateway.mode "local"
          openclaw config set gateway.bind "loopback"
          
          # Set a static security token so you can authenticate over the Cloudflare tunnel
          openclaw config set gateway.auth.token "openclaw-github-actions-secure-token-2026"
          
          # Set OpenRouter as your default model provider
          openclaw config set model.primary "openrouter/openrouter/auto"
          
          # Securely write your API key to the global .env file
          mkdir -p ~/.openclaw
          echo "OPENROUTER_API_KEY=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" >> ~/.openclaw/.env

      - name: Install Cloudflare Tunnel (cloudflared)
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start OpenClaw Gateway
        run: |
          # Start the gateway in the foreground using the proper CLI command
          nohup openclaw gateway run --port 18789 > openclaw.log 2>&1 &
          sleep 10 # Let the service boot up

      - name: Start Cloudflare Tunnel
        run: |
          # Start the free tunnel mapping to the gateway
          nohup cloudflared tunnel --url http://localhost:18789 > tunnel.log 2>&1 &
          sleep 10 # Wait for the public URL to resolve
          
          # Extract the generated tunnel link
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' tunnel.log | head -n 1)
          
          echo "==================================================================="
          echo "🚀 OPENCLAW DASHBOARD IS LIVE!"
          echo "🌐 Access your web interface here (token pre-authenticated):"
          echo "${TUNNEL_URL}/?token=openclaw-github-actions-secure-token-2026"
          echo "==================================================================="
          echo "Note: The GitHub Action will timeout and terminate after 6 hours."
          
          # Stream the logs to keep the Action running
          tail -f openclaw.log tunnel.log
