name: OpenClaw Web Interface

on:
  workflow_dispatch: # Allows you to trigger the run manually

jobs:
  deploy-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenClaw
        run: npm install -g openclaw

      - name: Configure OpenClaw and OpenRouter
        run: |
          mkdir -p ~/.openclaw
          # Inject the OpenClaw configuration with your API key
          cat << 'EOF' > ~/.openclaw/openclaw.json
          {
            "models": {
              "providers": {
                "openrouter": {
                  "apiKey": "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"
                }
              }
            }
          }
          EOF
          
          # Initialize OpenClaw baseline setup silently using npx to avoid PATH issues
          npx openclaw setup --baseline --non-interactive || true

      - name: Install Cloudflare Tunnel (cloudflared)
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start OpenClaw Gateway
        run: |
          # Start the OpenClaw Gateway in the background using npx
          nohup npx openclaw gateway > openclaw.log 2>&1 &
          sleep 10 # Allow time for the gateway to boot up

      - name: Start Cloudflare Tunnel
        run: |
          # Start the free Cloudflare Quick Tunnel pointing to the Gateway
          nohup cloudflared tunnel --url http://localhost:18789 > tunnel.log 2>&1 &
          sleep 10 # Allow time for Cloudflare to assign a public URL
          
          echo "==================================================================="
          echo "🚀 OPENCLAW DASHBOARD IS LIVE!"
          echo "🌐 Access your web interface here:"
          grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' tunnel.log
          echo "==================================================================="
          echo "Note: The GitHub Action will timeout and terminate after 6 hours."
          
          # Stream the logs to keep the Action running and visible
          tail -f openclaw.log tunnel.log
