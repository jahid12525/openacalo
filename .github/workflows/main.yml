name: Run OpenClaw
on:
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenClaw
        run: |
          npm install -g openclaw
          # Run install/setup if required by OpenClaw to prepare the interface
          # openclaw init 

      - name: Start OpenClaw
        run: |
          # Start the process in the background
          # Ensure it is bound to 0.0.0.0 so the tunnel can reach it
          openclaw start --port 8080 --host 0.0.0.0 & 
          
      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Setup cloudflared tunnel
        uses: AnimMouse/setup-cloudflared/tunnel@v2
        with:
          url: http://localhost:8080

      - name: Keep alive
        run: |
          echo "OpenClaw is running."
          echo "Access the web interface via the URL provided above."
          # Keeps the action running so the tunnel stays open
          sleep 6h
