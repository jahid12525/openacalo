name: Deploy OpenClaw Gateway with Ollama

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Keep-alive duration in hours (maximum 6)
        required: false
        default: "6"
        type: string
      model:
        description: Ollama model
        required: false
        default: qwen3.5:4b
        type: choice
        options:
          - qwen3.5:0.8b
          - qwen3.5:2b
          - qwen3.5:4b
          - qwen3.5:9b

permissions:
  contents: read

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    env:
      OLLAMA_HOST: 127.0.0.1:11434
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install OpenClaw
        shell: bash
        run: |
          set -euo pipefail
          SHARP_IGNORE_GLOBAL_LIBVIPS=1 \
            npm install --global openclaw@latest
          openclaw --version

      - name: Install Ollama
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --location --show-error \
            https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tar.zst \
            --output "$RUNNER_TEMP/ollama.tar.zst"

          sudo tar --use-compress-program=unzstd \
            -xf "$RUNNER_TEMP/ollama.tar.zst" \
            -C /usr

          command -v ollama
          ollama --version

          nohup ollama serve > "$RUNNER_TEMP/ollama.log" 2>&1 &
          OLLAMA_PID=$!
          echo "OLLAMA_PID=$OLLAMA_PID" >> "$GITHUB_ENV"

          for attempt in {1..60}; do
            if curl --fail --silent \
              http://127.0.0.1:11434/api/tags >/dev/null; then
              echo "Ollama is running"
              exit 0
            fi

            if ! kill -0 "$OLLAMA_PID" 2>/dev/null; then
              cat "$RUNNER_TEMP/ollama.log"
              exit 1
            fi

            sleep 2
          done

          cat "$RUNNER_TEMP/ollama.log"
          exit 1

      - name: Download and test Qwen
        shell: bash
        env:
          MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail

          ollama pull "$MODEL"
          ollama list

          curl --fail --silent --show-error \
            http://127.0.0.1:11434/api/generate \
            --header "Content-Type: application/json" \
            --data "$(jq -nc \
              --arg model "$MODEL" \
              '{
                model: $model,
                prompt: "Reply with exactly: ready",
                stream: false
              }')" |
            jq -e '.response' >/dev/null

      - name: Configure OpenClaw
        shell: bash
        env:
          MODEL: ${{ inputs.model }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${OPENCLAW_GATEWAY_TOKEN:-}" ]; then
            echo "::error::Configure OPENCLAW_GATEWAY_TOKEN"
            exit 1
          fi

          mkdir -p "$HOME/.openclaw"

          jq -n \
            --arg gatewayToken "$OPENCLAW_GATEWAY_TOKEN" \
            --arg telegramToken "${TELEGRAM_BOT_TOKEN:-}" \
            --arg model "$MODEL" \
            '{
              gateway: {
                mode: "local",
                bind: "loopback",
                auth: {
                  token: $gatewayToken
                },
                controlUi: {
                  dangerouslyAllowHostHeaderOriginFallback: true
                }
              },
              models: {
                providers: {
                  ollama: {
                    baseUrl: "http://127.0.0.1:11434/v1",
                    apiKey: "ollama"
                  }
                }
              },
              agents: {
                defaults: {
                  model: {
                    primary: ("ollama/" + $model)
                  },
                  models: {
                    ("ollama/" + $model): {}
                  }
                }
              },
              commands: {
                ownerAllowFrom: [680349125]
              },
              channels: (
                if $telegramToken == "" then {}
                else {
                  telegram: {
                    enabled: true,
                    botToken: $telegramToken,
                    dmPolicy: "allowlist",
                    allowFrom: [680349125]
                  }
                }
                end
              ),
              tools: {
                profile: "full",
                allow: ["*"],
                web: {
                  search: {
                    enabled: true,
                    provider: "duckduckgo"
                  },
                  fetch: {
                    enabled: true
                  }
                }
              },
              messages: {
                tts: {
                  auto: "always",
                  provider: "microsoft"
                }
              }
            }' > "$HOME/.openclaw/openclaw.json"

          cat > "$HOME/.openclaw/exec-approvals.json" <<'EOF'
          {
            "version": 1,
            "defaults": {
              "security": "full",
              "ask": "off",
              "askFallback": "full"
            }
          }
          EOF

          chmod 600 \
            "$HOME/.openclaw/openclaw.json" \
            "$HOME/.openclaw/exec-approvals.json"

      - name: Install Cloudflare Tunnel
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --location --show-error \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            --output "$RUNNER_TEMP/cloudflared"

          chmod +x "$RUNNER_TEMP/cloudflared"
          sudo mv "$RUNNER_TEMP/cloudflared" \
            /usr/local/bin/cloudflared

          cloudflared --version

      - name: Start OpenClaw Gateway
        shell: bash
        run: |
          set -euo pipefail

          nohup openclaw gateway --port 18789 --verbose \
            > "$RUNNER_TEMP/openclaw.log" 2>&1 &

          OPENCLAW_PID=$!
          echo "OPENCLAW_PID=$OPENCLAW_PID" >> "$GITHUB_ENV"

          for attempt in {1..60}; do
            if curl --fail --silent \
              http://127.0.0.1:18789 >/dev/null; then
              echo "OpenClaw Gateway is running"
              exit 0
            fi

            if ! kill -0 "$OPENCLAW_PID" 2>/dev/null; then
              cat "$RUNNER_TEMP/openclaw.log"
              exit 1
            fi

            sleep 2
          done

          cat "$RUNNER_TEMP/openclaw.log"
          exit 1

      - name: Start automatic device approver
        shell: bash
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/approve-devices.sh" <<'SCRIPT'
          #!/usr/bin/env bash

          while true; do
            OUTPUT="$(openclaw devices list 2>/dev/null || true)"

            while IFS= read -r DEVICE_ID; do
              [ -n "$DEVICE_ID" ] || continue

              echo "Approving device request: $DEVICE_ID"

              if openclaw devices approve "$DEVICE_ID"; then
                echo "Approved device: $DEVICE_ID"
              else
                echo "Could not approve $DEVICE_ID; retrying later"
              fi
            done < <(
              printf '%s\n' "$OUTPUT" |
                grep -iE 'pending|pair|request' |
                grep -oE \
                  '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' |
                sort -u || true
            )

            sleep 3
          done
          SCRIPT

          chmod +x "$RUNNER_TEMP/approve-devices.sh"

          nohup "$RUNNER_TEMP/approve-devices.sh" \
            > "$RUNNER_TEMP/device-approver.log" 2>&1 &

          DEVICE_APPROVER_PID=$!
          echo "DEVICE_APPROVER_PID=$DEVICE_APPROVER_PID" \
            >> "$GITHUB_ENV"

          echo "Automatic device approver started"

      - name: Start Cloudflare Tunnel
        shell: bash
        run: |
          set -euo pipefail

          nohup cloudflared tunnel \
            --no-autoupdate \
            --url http://127.0.0.1:18789 \
            > "$RUNNER_TEMP/cloudflared.log" 2>&1 &

          CLOUDFLARED_PID=$!
          echo "CLOUDFLARED_PID=$CLOUDFLARED_PID" \
            >> "$GITHUB_ENV"

          for attempt in {1..60}; do
            TUNNEL_URL="$(
              grep -oE \
                'https://[-a-zA-Z0-9]+\.trycloudflare\.com' \
                "$RUNNER_TEMP/cloudflared.log" |
              head -n 1 || true
            )"

            if [ -n "$TUNNEL_URL" ]; then
              echo "TUNNEL_URL=$TUNNEL_URL" >> "$GITHUB_ENV"

              {
                echo "## OpenClaw Gateway"
                echo
                echo "Dashboard: $TUNNEL_URL"
                echo
                echo "WebSocket: ${TUNNEL_URL/https:/wss:}"
                echo
                echo "Model: \`${{ inputs.model }}\`"
                echo
                echo "Device requests are approved automatically."
              } >> "$GITHUB_STEP_SUMMARY"

              echo "::notice title=OpenClaw Gateway::$TUNNEL_URL"
              exit 0
            fi

            if ! kill -0 "$CLOUDFLARED_PID" 2>/dev/null; then
              cat "$RUNNER_TEMP/cloudflared.log"
              exit 1
            fi

            sleep 2
          done

          cat "$RUNNER_TEMP/cloudflared.log"
          exit 1

      - name: Keep runner alive
        shell: bash
        env:
          REQUESTED_HOURS: ${{ inputs.duration }}
        run: |
          set -euo pipefail

          if ! [[ "$REQUESTED_HOURS" =~ ^[1-6]$ ]]; then
            echo "::error::Duration must be an integer from 1 to 6"
            exit 1
          fi

          END_TIME=$((SECONDS + REQUESTED_HOURS * 3600))

          echo "Gateway: $TUNNEL_URL"
          echo "Device pairing requests will be approved automatically."

          while (( SECONDS < END_TIME )); do
            for PROCESS_ID in \
              "$OLLAMA_PID" \
              "$OPENCLAW_PID" \
              "$DEVICE_APPROVER_PID" \
              "$CLOUDFLARED_PID"
            do
              if ! kill -0 "$PROCESS_ID" 2>/dev/null; then
                echo "::error::A required process stopped"
                exit 1
              fi
            done

            curl --fail --silent \
              http://127.0.0.1:11434/api/tags >/dev/null

            curl --fail --silent \
              http://127.0.0.1:18789 >/dev/null

            sleep 30
          done

      - name: Show diagnostic logs
        if: failure()
        shell: bash
        run: |
          echo "===== Ollama ====="
          tail -n 100 "$RUNNER_TEMP/ollama.log" 2>/dev/null || true

          echo "===== OpenClaw ====="
          tail -n 100 "$RUNNER_TEMP/openclaw.log" 2>/dev/null || true

          echo "===== Device approver ====="
          tail -n 100 "$RUNNER_TEMP/device-approver.log" \
            2>/dev/null || true

          echo "===== Cloudflared ====="
          tail -n 100 "$RUNNER_TEMP/cloudflared.log" \
            2>/dev/null || true
