name: Deploy OpenClaw Telegram Bot

on:
  workflow_dispatch:
    inputs:
      openrouter_api_key:
        description: 'OpenRouter API Key (Required for manual start)'
        required: true
        type: string


jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenClaw CLI
        run: npm install -g openclaw

      - name: Configure OpenClaw
        run: |
          mkdir -p ~/.openclaw
          # If triggered by cron, inputs are empty. Fall back to a secret if needed.
          API_KEY="${{ inputs.openrouter_api_key || secrets.OPENROUTER_API_KEY }}"
          
          cat << EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "mode": "local",
              "bind": "loopback",
              "auth": {
                "token": "openclaw-github-actions-secure-token-2026"
              }
            },
            "models": {
              "providers": {
                "openrouter": {
                  "apiKey": "$API_KEY"
                }
              }
            },
            "tools": {
              "web": {
                "search": {
                  "enabled": true,
                  "provider": "duckduckgo"
                }
              },
              "elevated": {
                "enabled": true,
                "allowFrom": {
                  "telegram": [680349125]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "openrouter/auto"
                },
                "tools": {
                  "allow": [
                    "web_search",
                    "read",
                    "write",
                    "apply_patch",
                    "web_fetch",
                    "image_analyze",
                    "edit",
                    "exec",
                    "sessions_spawn",
                    "sessions_send",
                    "sessions_yield",
                    "file_fetch",
                    "file_write",
                    "cron",
                    "browser",
                    "memory_search",
                    "memory_get",
                    "create_goal",
                    "update_goal"
                  ]
                }
              }
            },
            "commands": {
              "ownerAllowFrom": [680349125]
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
                "dmPolicy": "allowlist",
                "allowFrom": [680349125]
              }
            }
          }
          EOF

      - name: Run OpenClaw
        run: openclaw start
