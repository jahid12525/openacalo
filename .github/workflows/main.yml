name: Run OpenClaw
on:
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenClaw
        run: |
          npm install -g openclaw
          # Add npm global bin to path so 'openclaw' command is found
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Start OpenClaw
        run: |
          # Start OpenClaw in the background and verify it's running
          openclaw start --port 8080 --host 0.0.0.0 &
          echo "Waiting for OpenClaw to initialize..."
          sleep 10
          # Verify the process is listening on port 8080
          netstat -tuln | grep 8080

      - name: Start Cloudflare Tunnel
        run: |
          # This command will output the .trycloudflare.com link in the logs
          cloudflared tunnel --url http://localhost:8080 &
          # Wait a moment for the tunnel to register
          sleep 10
          echo "Tunnel started. Look at the logs above for the 'trycloudflare.com' URL."
          
      - name: Keep alive
        run: |
          echo "OpenClaw and Tunnel are running."
          # Keep the workflow alive for 6 hours
          sleep 6h
