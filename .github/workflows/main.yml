name: Run OpenClaw
on:
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Run OpenClaw
        run: |
          # 1. Install globally
          npm install -g openclaw
          
          # 2. Identify the global bin path
          GLOBAL_BIN=$(npm config get prefix)/bin
          
          # 3. Export path for this and future steps
          echo "$GLOBAL_BIN" >> $GITHUB_PATH
          
          # 4. Start OpenClaw using the full path to ensure it is found
          $GLOBAL_BIN/openclaw start --port 8080 --host 0.0.0.0 &
          
          echo "Waiting for OpenClaw to initialize..."
          sleep 15
          
          # 5. Verify it is running
          if netstat -tuln | grep -q 8080; then
            echo "OpenClaw is running on port 8080."
          else
            echo "Error: OpenClaw failed to start."
            exit 1
          fi

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Start Cloudflare Tunnel
        run: |
          # The cloudflared action automatically looks for the URL
          # Use the official action for the most reliable output
          cloudflared tunnel --url http://localhost:8080 &
          
          echo "Tunnel started. Please scroll through the logs above to find the 'trycloudflare.com' URL."
          sleep 6h
