name: OpenClaw + Gemma 4 Telegram Bot

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: openclaw-gateway
  cancel-in-progress: true

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GATEWAY_AUTH_TOKEN: ${{ secrets.GATEWAY_AUTH_TOKEN }}
      ADMIN_TELEGRAM_ID: "680349125"
      OLLAMA_MODEL: "gemma4:e2b"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server in background
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -s http://localhost:11434 >/dev/null && break
            sleep 1
          done

      - name: Pull Gemma 4 (free, local, no API key)
        run: ollama pull "$OLLAMA_MODEL"

      - name: Install OpenClaw
        run: npm install -g openclaw@latest

      - name: Write OpenClaw config
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');

          const homeDir = process.env.HOME || process.env.USERPROFILE;
          const configDir = path.join(homeDir, '.openclaw');
          fs.mkdirSync(configDir, { recursive: true });

          const adminId = process.env.ADMIN_TELEGRAM_ID;
          const botToken = process.env.TELEGRAM_BOT_TOKEN;
          const ollamaModel = process.env.OLLAMA_MODEL;

          const config = {
            gateway: {
              mode: 'local',
              bind: 'loopback',
              port: 18789,
              auth: { mode: 'none' } // Disables loopback token auth to prevent channel 401s
            },
            agents: {
              defaults: {
                model: {
                  primary: `ollama/${ollamaModel}`,
                  embedding: `ollama/${ollamaModel}` // Redirects embeddings to Ollama to prevent OpenAI 401s
                },
                models: {
                  [`ollama/${ollamaModel}`]: {
                    alias: 'gemma'
                  }
                }
              }
            },
            models: {
              mode: 'replace', 
              providers: {
                ollama: {
                  baseUrl: 'http://127.0.0.1:11434'
                }
              }
            },
            channels: {
              telegram: {
                enabled: true,
                botToken: botToken,
                dmPolicy: 'allowlist',
                allowFrom: [adminId],
                groupAllowFrom: [adminId]
              }
            },
            plugins: {
              entries: {
                ollama: { enabled: true },
                openai: { enabled: false },
                anthropic: { enabled: false },
                google: { enabled: false },
                groq: { enabled: false },
                cohere: { enabled: false }
              }
            },
            commands: {
              ownerAllowFrom: [`telegram:${adminId}`]
            }
          };

          fs.writeFileSync(
            path.join(configDir, 'openclaw.json'), 
            JSON.stringify(config, null, 2)
          );

      - name: Show config being loaded (debug)
        run: cat "$HOME/.openclaw/openclaw.json"

      - name: Run openclaw gateway
        run: |
          nohup openclaw gateway > /tmp/openclaw.log 2>&1 &
          
          echo "Waiting for OpenClaw Gateway to start..."
          SUCCESS=false
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:18789/health >/dev/null 2>&1 || curl -s http://127.0.0.1:18789 >/dev/null 2>&1; then
              echo "OpenClaw Gateway started successfully!"
              SUCCESS=true
              break
            fi
            sleep 1
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "Error: OpenClaw Gateway failed to start. Tail of /tmp/openclaw.log:"
            tail -n 50 /tmp/openclaw.log
            exit 1
          fi

      - name: Keep workflow running
        run: |
          echo "Bot is now active on Telegram. Keeping runner alive..."
          tail -f /tmp/openclaw.log
