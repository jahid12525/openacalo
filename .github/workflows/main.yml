name: Deploy OpenClaw Gateway (Kimi via Ollama)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Keep-alive duration in hours (max 6)'
        required: false
        default: '6'
        type: string

jobs:
  run-openclaw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # Start Ollama in the background
          ollama serve > ollama.log 2>&1 &
          echo "Waiting for Ollama to boot..."
          sleep 10
          # Pull the Kimi model
          ollama pull kimi

      - name: Install OpenClaw CLI and Gateway
        run: |
          SHARP_IGNORE_GLOBAL_LIBVIPS=1 npm install -g openclaw@latest

      - name: Configure OpenClaw for Ollama
        run: |
          mkdir -p ~/.openclaw
          
          # Create config using Ollama as the provider
          cat << 'EOF' > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "mode": "local",
              "bind": "loopback",
              "auth": {
                "token": "openclaw-github-actions-secure-token-2026"
              }
            },
            "models": {
              "providers": {
                "ollama": {
                  "endpoint": "http://127.0.0.1:11434"
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "ollama/kimi"
                }
              }
            },
            "commands": {
              "ownerAllowFrom": [680349125]
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
                "dmPolicy": "allowlist",
                "allowFrom": [680349125]
              }
            }
          }
          EOF

      - name: Install Cloudflare Tunnel (cloudflared)
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start OpenClaw Gateway
        run: |
          # Launch gateway pointing to the Ollama provider
          nohup openclaw gateway --port 18789 --verbose > openclaw.log 2>&1 &
          
          echo "Waiting for OpenClaw Gateway to boot..."
          for i in {1..15}; do
            if openclaw gateway status 2>/dev/null | grep -q "running"; then
              echo "Gateway successfully booted!"
              break
            fi
            sleep 2
          done

      - name: Start Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --url http://127.0.0.1:18789 > cloudflared.log 2>&1 &
          sleep 12
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflared.log | head -n 1)
          echo "Access Dashboard: $TUNNEL_URL"

      - name: Keep-Alive
        run: |
          HOURS=${{ inputs.duration }}
          [ "$HOURS" -gt 6 ] && HOURS=6
          sleep $((HOURS * 3600))
