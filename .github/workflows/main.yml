name: Deploy OpenClaw Gateway with NVIDIA NIM API Pool

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Keep-alive duration in hours (maximum 6)
        required: false
        default: "6"
        type: string
      model:
        description: NVIDIA NIM model
        required: false
        default: nvidia/nemotron-3-ultra-550b-a55b
        type: choice
        options:
          - nvidia/nemotron-3-ultra-550b-a55b
          - moonshotai/kimi-k2.6
          - deepseek-ai/deepseek-v4-pro
          - z-ai/glm-5.2

permissions:
  contents: read

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    env:
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      NVIDIA_API_KEYS: ${{ secrets.NVIDIA_API_KEYS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate configuration
        shell: bash
        env:
          REQUESTED_HOURS: ${{ inputs.duration }}
        run: |
          set -euo pipefail

          if [ -z "${OPENCLAW_GATEWAY_TOKEN:-}" ]; then
            echo "::error::Configure OPENCLAW_GATEWAY_TOKEN"
            exit 1
          fi

          if [ -z "${NVIDIA_API_KEYS:-}" ]; then
            echo "::error::Configure NVIDIA_API_KEYS"
            exit 1
          fi

          if ! [[ "$REQUESTED_HOURS" =~ ^[1-6]$ ]]; then
            echo "::error::Duration must be an integer from 1 to 6"
            exit 1
          fi

          KEY_COUNT=0

          while IFS= read -r KEY || [ -n "$KEY" ]; do
            KEY="${KEY//$'\r'/}"
            KEY="${KEY#"${KEY%%[![:space:]]*}"}"
            KEY="${KEY%"${KEY##*[![:space:]]}"}"

            [ -n "$KEY" ] || continue

            echo "::add-mask::$KEY"
            KEY_COUNT=$((KEY_COUNT + 1))
          done <<< "$NVIDIA_API_KEYS"

          if [ "$KEY_COUNT" -eq 0 ]; then
            echo "::error::NVIDIA_API_KEYS contains no API keys"
            exit 1
          fi

          echo "Found $KEY_COUNT NVIDIA API key(s)"

      - name: Install OpenClaw
        shell: bash
        run: |
          set -euo pipefail

          SHARP_IGNORE_GLOBAL_LIBVIPS=1 \
            npm install --global openclaw@latest

          openclaw --version

      - name: Install Camoufox browser plugin
        shell: bash
        run: |
          set -euo pipefail

          npm install --global @askjo/camofox-browser
          openclaw plugins install @askjo/camofox-browser

      - name: Select working NVIDIA API key
        shell: bash
        env:
          MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail

          SELECTED_KEY=""
          SELECTED_INDEX=""
          INDEX=0

          while IFS= read -r KEY || [ -n "$KEY" ]; do
            KEY="${KEY//$'\r'/}"
            KEY="${KEY#"${KEY%%[![:space:]]*}"}"
            KEY="${KEY%"${KEY##*[![:space:]]}"}"

            [ -n "$KEY" ] || continue

            INDEX=$((INDEX + 1))
            echo "::add-mask::$KEY"
            echo "Testing NVIDIA API key $INDEX..."

            RESPONSE_FILE="$RUNNER_TEMP/nim-response-$INDEX.json"

            HTTP_CODE="$(
              curl \
                --silent \
                --show-error \
                --connect-timeout 15 \
                --max-time 120 \
                --output "$RESPONSE_FILE" \
                --write-out "%{http_code}" \
                --request POST \
                "https://integrate.api.nvidia.com/v1/chat/completions" \
                --header "Content-Type: application/json" \
                --header "Authorization: Bearer ${KEY}" \
                --data "$(jq -n --arg model "$MODEL" '{
                  model: $model,
                  messages: [{
                    role: "user",
                    content: "Reply with ready."
                  }],
                  temperature: 0,
                  max_tokens: 32
                }')" || true
            )"

            if [[ "$HTTP_CODE" =~ ^2[0-9][0-9]$ ]] &&
              jq -e '.choices | length > 0' \
                "$RESPONSE_FILE" >/dev/null 2>&1; then
              SELECTED_KEY="$KEY"
              SELECTED_INDEX="$INDEX"
              echo "NVIDIA API key $INDEX is working"
              break
            fi

            ERROR_MESSAGE="$(
              jq -r '.error.message // .detail // "Request failed"' \
                "$RESPONSE_FILE" 2>/dev/null ||
                echo "Request failed"
            )"

            echo "::warning::NVIDIA key $INDEX failed with HTTP ${HTTP_CODE:-000}: $ERROR_MESSAGE"
          done <<< "$NVIDIA_API_KEYS"

          if [ -z "$SELECTED_KEY" ]; then
            echo "::error::None of the NVIDIA API keys worked"
            exit 1
          fi

          echo "::add-mask::$SELECTED_KEY"

          {
            echo "NVIDIA_API_KEY=$SELECTED_KEY"
            echo "SELECTED_NVIDIA_KEY_INDEX=$SELECTED_INDEX"
          } >> "$GITHUB_ENV"

          echo "Selected NVIDIA API key $SELECTED_INDEX"

      - name: Generate Camoufox API key
        shell: bash
        run: |
          set -euo pipefail

          CAMOFOX_API_KEY="$(openssl rand -hex 32)"
          echo "::add-mask::${CAMOFOX_API_KEY}"
          echo "CAMOFOX_API_KEY=${CAMOFOX_API_KEY}" >> "$GITHUB_ENV"

      - name: Configure OpenClaw
        shell: bash
        env:
          MODEL: ${{ inputs.model }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.openclaw"

          jq -n \
            --arg gatewayToken "$OPENCLAW_GATEWAY_TOKEN" \
            --arg nvidiaApiKey "$NVIDIA_API_KEY" \
            --arg telegramToken "${TELEGRAM_BOT_TOKEN:-}" \
            --arg model "$MODEL" \
            '{
              gateway: {
                mode: "local",
                bind: "loopback",
                auth: {
                  token: $gatewayToken
                },
                controlUi: {
                  dangerouslyAllowHostHeaderOriginFallback: true
                }
              },
              env: {
                NVIDIA_API_KEY: $nvidiaApiKey
              },
              models: {
                providers: {
                  nvidia: {
                    baseUrl: "https://integrate.api.nvidia.com/v1",
                    api: "openai-completions",
                    apiKey: $nvidiaApiKey
                  }
                }
              },
              agents: {
                defaults: {
                  model: {
                    primary: ("nvidia/" + $model)
                  },
                  models: {
                    ("nvidia/" + $model): {}
                  }
                }
              },
              commands: {
                ownerAllowFrom: [680349125]
              },
              channels: (
                if $telegramToken == "" then {}
                else {
                  telegram: {
                    enabled: true,
                    botToken: $telegramToken,
                    dmPolicy: "allowlist",
                    allowFrom: [680349125]
                  }
                }
                end
              ),
              tools: {
                profile: "full",
                allow: ["*"],
                web: {
                  search: {
                    enabled: true,
                    provider: "duckduckgo"
                  },
                  fetch: {
                    enabled: true
                  }
                }
              },
              messages: {
                tts: {
                  auto: "always",
                  provider: "microsoft"
                }
              }
            }' > "$HOME/.openclaw/openclaw.json"

          cat > "$HOME/.openclaw/exec-approvals.json" <<'EOF'
          {
            "version": 1,
            "defaults": {
              "security": "full",
              "ask": "off",
              "askFallback": "full"
            }
          }
          EOF

          chmod 600 \
            "$HOME/.openclaw/openclaw.json" \
            "$HOME/.openclaw/exec-approvals.json"

          openclaw doctor

      - name: Install Cloudflare Tunnel
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            --output "$RUNNER_TEMP/cloudflared"

          chmod +x "$RUNNER_TEMP/cloudflared"

          sudo mv \
            "$RUNNER_TEMP/cloudflared" \
            /usr/local/bin/cloudflared

          cloudflared --version

      - name: Start Camoufox browser server
        shell: bash
        run: |
          set -euo pipefail

          nohup npx @askjo/camofox-browser \
            > "$RUNNER_TEMP/camofox.log" 2>&1 &

          CAMOFOX_PID=$!

          echo "CAMOFOX_PID=$CAMOFOX_PID" >> "$GITHUB_ENV"

          # First run downloads Camoufox (~300MB), so allow extra time.
          for attempt in {1..150}; do
            if curl --fail --silent \
              http://127.0.0.1:9377/health >/dev/null; then
              echo "Camoufox browser server is running"
              exit 0
            fi

            if ! kill -0 "$CAMOFOX_PID" 2>/dev/null; then
              echo "::error::Camoufox server exited unexpectedly"
              cat "$RUNNER_TEMP/camofox.log"
              exit 1
            fi

            sleep 2
          done

          echo "::error::Camoufox server failed to start"
          cat "$RUNNER_TEMP/camofox.log"
          exit 1

      - name: Start OpenClaw Gateway
        shell: bash
        run: |
          set -euo pipefail

          nohup openclaw gateway --port 18789 --verbose \
            > "$RUNNER_TEMP/openclaw.log" 2>&1 &

          OPENCLAW_PID=$!

          echo "OPENCLAW_PID=$OPENCLAW_PID" \
            >> "$GITHUB_ENV"

          for attempt in {1..60}; do
            if curl --fail --silent \
              http://127.0.0.1:18789 >/dev/null; then
              echo "OpenClaw Gateway is running"
              exit 0
            fi

            if ! kill -0 "$OPENCLAW_PID" 2>/dev/null; then
              echo "::error::OpenClaw exited unexpectedly"
              cat "$RUNNER_TEMP/openclaw.log"
              exit 1
            fi

            sleep 2
          done

          echo "::error::OpenClaw failed to start"
          cat "$RUNNER_TEMP/openclaw.log"
          exit 1

      - name: Start automatic device approver
        shell: bash
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/approve-devices.sh" <<'SCRIPT'
          #!/usr/bin/env bash

          while true; do
            OUTPUT="$(openclaw devices list 2>/dev/null || true)"

            while IFS= read -r DEVICE_ID; do
              [ -n "$DEVICE_ID" ] || continue

              echo "Approving device: $DEVICE_ID"
              openclaw devices approve "$DEVICE_ID" || true
            done < <(
              printf '%s\n' "$OUTPUT" |
                grep -iE 'pending|pair|request' |
                grep -oE \
                  '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' |
                sort -u || true
            )

            sleep 3
          done
          SCRIPT

          chmod +x "$RUNNER_TEMP/approve-devices.sh"

          nohup "$RUNNER_TEMP/approve-devices.sh" \
            > "$RUNNER_TEMP/device-approver.log" 2>&1 &

          DEVICE_APPROVER_PID=$!

          echo "DEVICE_APPROVER_PID=$DEVICE_APPROVER_PID" \
            >> "$GITHUB_ENV"

      - name: Start Cloudflare Tunnel
        shell: bash
        run: |
          set -euo pipefail

          nohup cloudflared tunnel \
            --no-autoupdate \
            --url http://127.0.0.1:18789 \
            > "$RUNNER_TEMP/cloudflared.log" 2>&1 &

          CLOUDFLARED_PID=$!

          echo "CLOUDFLARED_PID=$CLOUDFLARED_PID" \
            >> "$GITHUB_ENV"

          for attempt in {1..60}; do
            TUNNEL_URL="$(
              grep -oE \
                'https://[-a-zA-Z0-9]+\.trycloudflare\.com' \
                "$RUNNER_TEMP/cloudflared.log" |
                head -n 1 || true
            )"

            if [ -n "$TUNNEL_URL" ]; then
              WEBSOCKET_URL="${TUNNEL_URL/https:/wss:}"

              echo "TUNNEL_URL=$TUNNEL_URL" \
                >> "$GITHUB_ENV"

              {
                echo "## OpenClaw Gateway"
                echo
                echo "Dashboard: $TUNNEL_URL"
                echo
                echo "WebSocket: $WEBSOCKET_URL"
                echo
                echo "Model: \`nvidia/${{ inputs.model }}\`"
                echo
                echo "NVIDIA key slot: $SELECTED_NVIDIA_KEY_INDEX"
                echo
                echo "Browser: Camoufox (anti-detect)"
                echo
                echo "Device requests are approved automatically."
              } >> "$GITHUB_STEP_SUMMARY"

              echo "::notice title=OpenClaw Gateway::$TUNNEL_URL"
              exit 0
            fi

            if ! kill -0 "$CLOUDFLARED_PID" 2>/dev/null; then
              echo "::error::Cloudflare Tunnel exited unexpectedly"
              cat "$RUNNER_TEMP/cloudflared.log"
              exit 1
            fi

            sleep 2
          done

          echo "::error::Cloudflare Tunnel failed to start"
          cat "$RUNNER_TEMP/cloudflared.log"
          exit 1

      - name: Keep runner alive
        shell: bash
        env:
          REQUESTED_HOURS: ${{ inputs.duration }}
        run: |
          set -euo pipefail

          END_TIME=$((SECONDS + REQUESTED_HOURS * 3600))

          echo "Gateway: $TUNNEL_URL"
          echo "NVIDIA key slot: $SELECTED_NVIDIA_KEY_INDEX"
          echo "Keeping gateway active for $REQUESTED_HOURS hour(s)"

          while (( SECONDS < END_TIME )); do
            for PROCESS_ID in \
              "$OPENCLAW_PID" \
              "$DEVICE_APPROVER_PID" \
              "$CLOUDFLARED_PID" \
              "$CAMOFOX_PID"
            do
              if ! kill -0 "$PROCESS_ID" 2>/dev/null; then
                echo "::error::A required process stopped"
                exit 1
              fi
            done

            if ! curl --fail --silent \
              http://127.0.0.1:18789 >/dev/null; then
              echo "::error::OpenClaw stopped responding"
              exit 1
            fi

            if ! curl --fail --silent \
              http://127.0.0.1:9377/health >/dev/null; then
              echo "::error::Camoufox stopped responding"
              exit 1
            fi

            sleep 30
          done

      - name: Show diagnostic logs
        if: failure()
        shell: bash
        run: |
          echo "===== NVIDIA responses ====="

          for FILE in "$RUNNER_TEMP"/nim-response-*.json; do
            [ -f "$FILE" ] || continue
            echo "===== $(basename "$FILE") ====="
            jq . "$FILE" 2>/dev/null || true
          done

          echo "===== OpenClaw ====="
          tail -n 150 "$RUNNER_TEMP/openclaw.log" \
            2>/dev/null || true

          echo "===== Camoufox ====="
          tail -n 100 "$RUNNER_TEMP/camofox.log" \
            2>/dev/null || true

          echo "===== Device approver ====="
          tail -n 100 "$RUNNER_TEMP/device-approver.log" \
            2>/dev/null || true

          echo "===== Cloudflared ====="
          tail -n 100 "$RUNNER_TEMP/cloudflared.log" \
            2>/dev/null || true
