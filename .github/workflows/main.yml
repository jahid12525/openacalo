name: Run OpenClaw
on:
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Run OpenClaw
        run: |
          # Install globally
          npm install -g openclaw
          
          # Run using npx to automatically resolve the binary and capture logs
          nohup npx openclaw start --port 8080 --host 0.0.0.0 > openclaw.log 2>&1 &
          
          echo "Waiting for OpenClaw to initialize..."
          sleep 20
          
          # Verify the process is running on port 8080
          if netstat -tuln | grep -q 8080; then
            echo "OpenClaw is successfully running on port 8080."
          else
            echo "Error: OpenClaw failed to start. Printing log output:"
            cat openclaw.log
            exit 1
          fi

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Start Cloudflare Tunnel
        run: |
          # Start the tunnel in the background
          cloudflared tunnel --url http://localhost:8080 &
          
          # Wait for the tunnel to establish
          sleep 10
          
          echo "--------------------------------------------------------"
          echo "Tunnel started. Look at the logs for the 'trycloudflare.com' URL."
          echo "--------------------------------------------------------"
          
      - name: Keep alive
        run: |
          echo "OpenClaw is running and accessible via the Cloudflare tunnel."
          # Keeps the workflow active for 6 hours
          sleep 6h
