name: Deploy OpenClaw Gateway with Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      openrouter_api_key:
        description: 'Your OpenRouter API Key (sk-or-...)'
        required: true
        type: string
      telegram_bot_token:
        description: 'Telegram bot token (from BotFather)'
        required: true
        type: string
      telegram_allowed_user_id:
        description: 'Your numeric Telegram user ID (only this user can talk to the bot)'
        required: true
        type: string
      gateway_token:
        description: 'Secret token to protect the gateway control UI'
        required: true
        type: string
      duration:
        description: 'Keep-alive duration in hours (max 6)'
        required: false
        default: '6'
        type: string

jobs:
  run-openclaw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install OpenClaw CLI and Gateway
        run: |
          SHARP_IGNORE_GLOBAL_LIBVIPS=1 npm install -g openclaw@latest

      - name: Configure OpenClaw
        run: |
          mkdir -p ~/.openclaw
          cat << EOF > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "mode": "local",
              "bind": "loopback",
              "auth": {
                "token": "${{ inputs.gateway_token }}"
              }
            },
            "models": {
              "providers": {
                "openrouter": {
                  "apiKey": "${{ inputs.openrouter_api_key }}"
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "openrouter/auto"
                },
                "models": {
                  "openrouter/auto": {}
                }
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "${{ inputs.telegram_bot_token }}",
                "allowedUsers": [${{ inputs.telegram_allowed_user_id }}],
                "adminUser": ${{ inputs.telegram_allowed_user_id }}
              }
            },
            "plugins": {
              "allow": ["telegram", "browser"]
            },
            "browser": {
              "enabled": true
            },
            "tools": {
              "profile": "full",
              "planTool": true
            }
          }
          EOF

      - name: Install Cloudflare Tunnel (cloudflared)
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start OpenClaw Gateway
        run: |
          nohup openclaw gateway --port 18789 --verbose > openclaw.log 2>&1 &

          echo "Waiting for OpenClaw Gateway to boot..."
          for i in {1..15}; do
            if openclaw gateway status 2>/dev/null | grep -q "running"; then
              echo "Gateway successfully booted!"
              openclaw gateway status
              break
            fi
            sleep 2
          done

      - name: Start Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --url http://127.0.0.1:18789 > cloudflared.log 2>&1 &

          echo "Waiting for Cloudflare Tunnel to generate public link..."
          sleep 12

          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflared.log | head -n 1)

          if [ -n "$TUNNEL_URL" ]; then
            echo "=========================================================================="
            echo "🚀 OPENCLAW GATEWAY IS LIVE!"
            echo "🔗 Access Dashboard: $TUNNEL_URL"
            echo "=========================================================================="
          else
            echo "⚠️ Could not retrieve Cloudflare Tunnel URL automatically."
            cat cloudflared.log | tail -n 20
            exit 1
          fi

      - name: Keep-Alive Daemon
        run: |
          HOURS=${{ inputs.duration }}
          if [ "$HOURS" -gt 6 ]; then
            HOURS=6
          fi
          TOTAL_SECONDS=$((HOURS * 3600))
          echo "Keeping runner alive for $HOURS hour(s)."
          echo "Any pending device pairing requests must be approved manually:"
          echo "  openclaw devices list"
          echo "  openclaw devices approve <id>"
          sleep $TOTAL_SECONDS
