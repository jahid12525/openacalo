- name: Authenticate with Gemini CLI
  shell: bash
  run: |
    set -euo pipefail

    cat > "$RUNNER_TEMP/openclaw-auth.exp" <<'EXPECT'
    #!/usr/bin/expect -f

    set timeout 1200
    log_user 1

    spawn openclaw onboard --auth-choice google-gemini-cli

    expect {
      -re {I understand.*Continue\?} {
        send "\r"
        exp_continue
      }
      -re {Continue with Google Gemini CLI OAuth\?} {
        send "\r"
        exp_continue
      }
      -re {Waiting for OAuth callback} {
        exp_continue
      }
      eof
    }

    catch wait result
    set exit_code [lindex $result 3]
    exit $exit_code
    EXPECT

    chmod +x "$RUNNER_TEMP/openclaw-auth.exp"

    echo "Run the SSH forwarding command on your PC."
    echo "Then open the Google OAuth URL shown below."

    "$RUNNER_TEMP/openclaw-auth.exp"
