name: Deploy OpenClaw Gateway with Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      model_source:
        description: 'Choose model source (Ollama runs locally on runner, OpenRouter calls hosted API)'
        required: true
        default: 'openrouter'
        type: choice
        options:
          - 'openrouter'
          - 'ollama'
      openrouter_api_key:
        description: 'Your OpenRouter API Key (required if source is openrouter)'
        required: false
        type: string
      openrouter_model:
        description: 'Gemma 4 model to use on OpenRouter'
        required: false
        default: 'google/gemma-4-26b-it'
        type: choice
        options:
          - 'google/gemma-4-26b-it'
          - 'google/gemma-4-31b-it'
      local_gemma_size:
        description: 'Gemma 4 model size for local Ollama run (e2b=2B model, e4b=4B model)'
        required: false
        default: 'gemma4:e4b'
        type: choice
        options:
          - 'gemma4:e2b'
          - 'gemma4:e4b'
      duration:
        description: 'Keep-alive duration in hours (max 6)'
        required: false
        default: '6'
        type: string

jobs:
  run-openclaw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install OpenClaw CLI and Gateway
        run: |
          SHARP_IGNORE_GLOBAL_LIBVIPS=1 npm install -g openclaw@latest

      - name: Install and Start Ollama (Local Gemma 4)
        if: ${{ inputs.model_source == 'ollama' }}
        run: |
          echo "Installing Ollama..."
          curl -fsSL https://ollama.com/install.sh | sh
          
          echo "Starting Ollama server in background..."
          nohup ollama serve > ollama.log 2>&1 &
          
          echo "Waiting for Ollama server to respond..."
          for i in {1..15}; do
            if curl -s http://127.0.0.1:11434/api/tags > /dev/null; then
              echo "Ollama server is active!"
              break
            fi
            sleep 2
          done
          
          echo "Pulling Gemma 4 (${{ inputs.local_gemma_size }})..."
          ollama pull ${{ inputs.local_gemma_size }}

      - name: Configure OpenClaw
        run: |
          mkdir -p ~/.openclaw
          
          # Create JS helper to construct openclaw.json dynamically based on model source
          cat << 'EOF' > generate_config.js
          const fs = require('fs');
          const source = process.argv[2];
          const openrouterKey = process.argv[3];
          const openrouterModel = process.argv[4];
          const localGemmaSize = process.argv[5];

          const config = {
            "gateway": {
              "mode": "local",
              "bind": "loopback",
              "auth": {
                "token": "openclaw-github-actions-secure-token-2026"
              },
              "controlUi": {
                "dangerouslyAllowHostHeaderOriginFallback": true
              }
            },
            "models": {
              "providers": {}
            },
            "agents": {
              "defaults": {
                "model": {},
                "models": {}
              }
            },
            "commands": {
              "ownerAllowFrom": [680349125]
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
                "dmPolicy": "allowlist",
                "allowFrom": [680349125]
              }
            },
            "tools": {
              "profile": "full",
              "allow": ["*"],
              "web": {
                "search": {
                  "enabled": true,
                  "provider": "duckduckgo"
                },
                "fetch": {
                  "enabled": true
                }
              }
            },
            "messages": {
              "tts": {
                "auto": "always",
                "provider": "microsoft"
              }
            }
          };

          if (source === 'openrouter') {
            config.models.providers.openrouter = {
              "apiKey": openrouterKey
            };
            config.agents.defaults.model.primary = "openrouter/" + openrouterModel;
            config.agents.defaults.models["openrouter/" + openrouterModel] = {};
          } else if (source === 'ollama') {
            config.models.providers.ollama = {
              "baseUrl": "http://127.0.0.1:11434",
              "apiKey": "ollama-local",
              "api": "ollama",
              "models": [
                {
                  "id": localGemmaSize,
                  "name": "Local Gemma 4",
                  "contextWindow": 128000,
                  "maxOutput": 4096,
                  "toolCalling": true
                }
              ]
            };
            config.agents.defaults.model.primary = "ollama/" + localGemmaSize;
            config.agents.defaults.models["ollama/" + localGemmaSize] = {};
          }

          fs.writeFileSync(process.env.HOME + '/.openclaw/openclaw.json', JSON.stringify(config, null, 2));
          EOF

          node generate_config.js "${{ inputs.model_source }}" "${{ inputs.openrouter_api_key }}" "${{ inputs.openrouter_model }}" "${{ inputs.local_gemma_size }}"

          # Create exec approvals config to auto-approve host execution commands (YOLO mode)
          cat << 'EOF' > ~/.openclaw/exec-approvals.json
          {
            "version": 1,
            "defaults": {
              "security": "full",
              "ask": "off",
              "askFallback": "full"
            }
          }
          EOF

      - name: Install Cloudflare Tunnel (cloudflared)
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start OpenClaw Gateway
        run: |
          nohup openclaw gateway --port 18789 --verbose > openclaw.log 2>&1 &
          
          echo "Waiting for OpenClaw Gateway to boot..."
          for i in {1..15}; do
            if openclaw gateway status 2>/dev/null | grep -q "running"; then
              echo "Gateway successfully booted!"
              openclaw gateway status
              break
            fi
            sleep 2
          done

      - name: Start Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --url http://127.0.0.1:18789 > cloudflared.log 2>&1 &
          
          echo "Waiting for Cloudflare Tunnel to generate public link..."
          sleep 12
          
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflared.log | head -n 1)
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "=========================================================================="
            echo "🚀 OPENCLAW GATEWAY IS LIVE!"
            echo "🔗 Access Dashboard: $TUNNEL_URL"
            echo "🔑 Secret Token: openclaw-github-actions-secure-token-2026"
            echo "=========================================================================="
          else
            echo "⚠️ Could not retrieve Cloudflare Tunnel URL automatically."
            echo "Checking cloudflared logs:"
            cat cloudflared.log | tail -n 20
            exit 1
          fi

      - name: Keep-Alive Daemon & Auto-Device Approver
        run: |
          HOURS=${{ inputs.duration }}
          if [ "$HOURS" -gt 6 ]; then
            HOURS=6
          fi
          TOTAL_SECONDS=$((HOURS * 3600))
          ELAPSED_SECONDS=0
          
          echo "Keeping runner alive for $HOURS hour(s). Monitoring for incoming browser pairing requests..."
          
          while [ $ELAPSED_SECONDS -lt $TOTAL_SECONDS ]; do
            PENDING_ID=$(openclaw devices list 2>/dev/null | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n 1)
            
            if [ -n "$PENDING_ID" ]; then
              echo "🔒 [Auto-Auth] Detected connection request ID: $PENDING_ID"
              openclaw devices approve "$PENDING_ID"
              echo "✅ [Auto-Auth] Device successfully paired!"
            fi
            
            sleep 4
            ELAPSED_SECONDS=$((ELAPSED_SECONDS + 4))
          done
