name: OpenClaw + Gemma 4 Telegram Bot
# GitHub Actions cannot host a true always-on process — jobs are killed at
# the timeout below no matter what. This workflow relaunches itself every
# 5 hours via cron so the bot comes back up shortly after each kill. If you
# want a bot that's actually always online with no gaps, run this same
# install script on a cheap always-on VPS instead (systemd/Docker) and
# drop the GitHub Actions wrapper entirely.
on:
  workflow_dispatch: {}

concurrency:
  group: openclaw-gateway
  cancel-in-progress: true

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 340   # stay under GitHub's 360-minute (6h) hard cap
    env:
      # Set this in: repo Settings -> Secrets and variables -> Actions -> New repository secret
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      # Optional but recommended: set this secret too, so the gateway has a
      # stable auth token instead of generating a new one every restart.
      GATEWAY_AUTH_TOKEN: ${{ secrets.GATEWAY_AUTH_TOKEN }}
      # Real numeric Telegram user ID, hard-coded directly (not a secret).
      ADMIN_TELEGRAM_ID: "680349125"
      OLLAMA_MODEL: "gemma4:e2b" # 7.2GB — fits a CPU-only runner. Other real tags: e4b, 12b, 26b, 31b
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server in background
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -s http://localhost:11434 >/dev/null && break
            sleep 1
          done

      - name: Pull Gemma 4 (free, local, no API key)
        run: ollama pull "$OLLAMA_MODEL"

      - name: List pulled models (debug)
        run: ollama list

      - name: Install OpenClaw
        run: npm install -g openclaw@latest

      - name: Write OpenClaw config
        run: |
          mkdir -p "$HOME/.openclaw"
          cat > "$HOME/.openclaw/openclaw.json" <<EOF
          {
            "gateway": {
              "mode": "local"
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "ollama/${OLLAMA_MODEL}"
                }
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "${TELEGRAM_BOT_TOKEN}",
                "dmPolicy": "allowlist",
                "allowFrom": ["${ADMIN_TELEGRAM_ID}"],
                "groupAllowFrom": ["${ADMIN_TELEGRAM_ID}"]
              }
            },
            "plugins": {
              "entries": {
                "ollama": {
                  "enabled": true
                }
              }
            },
            "commands": {
              "ownerAllowFrom": ["telegram:${ADMIN_TELEGRAM_ID}"]
            }
          }
          EOF
          chmod 600 "$HOME/.openclaw/openclaw.json"

      - name: Show config being loaded (debug)
        run: cat "$HOME/.openclaw/openclaw.json"

      - name: Set gateway auth token (if provided)
        if: env.GATEWAY_AUTH_TOKEN != ''
        run: |
          openclaw config set gateway.auth.mode token
          openclaw config set gateway.auth.token "$GATEWAY_AUTH_TOKEN"

      - name: Run OpenClaw Gateway
        run: openclaw gateway
