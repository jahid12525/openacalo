name: OpenClaw CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # -----------------------------------------------------------------
    # CHANGE THIS to your subfolder path if package.json is not in the root.
    # For example: working-directory: ./my-subfolder-name
    # -----------------------------------------------------------------
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 1: Clean up pre-installed software to reclaim ~20GB of disk space
      - name: Free Disk Space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "Disk space after cleanup:"
          df -h

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies (npm ci = reproducible, lockfile-respecting)
      - name: Install Project Dependencies
        run: npm ci

      # Step 4: Install Ollama
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # Step 5: Spin up Ollama and pull the model, with a bounded wait and logging
      - name: Start Ollama & Pull Model
        run: |
          # Start the Ollama server in the background, detached, with logs captured
          nohup ollama serve > ollama.log 2>&1 &
          echo $! > ollama.pid

          echo "Waiting for Ollama to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434/ > /dev/null; then
              echo "Ollama is running!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Ollama failed to start within 60 seconds. Logs:"
              cat ollama.log
              exit 1
            fi
            sleep 2
          done

          # Pull the model, failing loudly if it doesn't succeed
          ollama pull gemma4:e4b

      # Step 6: Run your application / test suite
      - name: Run OpenClaw
        env:
          OLLAMA_HOST: http://localhost:11434
        run: npm test
