name: Deploy OpenClaw Gateway with Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      openrouter_api_key:
        description: 'Your OpenRouter API Key (sk-or-...)'
        required: true
        type: string
      duration:
        description: 'Keep-alive duration in hours (max 6)'
        required: false
        default: '6'
        type: string

jobs:
  run-openclaw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install OpenClaw CLI and Gateway
        run: |
          SHARP_IGNORE_GLOBAL_LIBVIPS=1 npm install -g openclaw@latest

      - name: Configure OpenClaw
        run: |
          mkdir -p ~/.openclaw

          # ─── Primary Configuration ───────────────────────────────────
          cat << 'EOF' > ~/.openclaw/openclaw.json
          {
            "gateway": {
              "mode": "local",
              "bind": "loopback",
              "auth": {
                "token": "openclaw-github-actions-secure-token-2026"
              },
              "controlUi": {
                "dangerouslyAllowHostHeaderOriginFallback": true
              }
            },
            "models": {
              "providers": {
                "openrouter": {
                  "apiKey": "${{ inputs.openrouter_api_key }}",
                  "rateLimit": {
                    "requestsPerMinute": 10,
                    "tokensPerMinute": 50000
                  },
                  "retry": {
                    "maxRetries": 3,
                    "baseDelayMs": 2000,
                    "maxDelayMs": 30000
                  }
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "openrouter/google/gemini-2.0-flash-exp:free"
                },
                "models": {
                  "openrouter/google/gemini-2.0-flash-exp:free": {
                    "maxTokens": 2048,
                    "temperature": 0.7
                  }
                }
              }
            },
            "commands": {
              "ownerAllowFrom": [680349125]
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
                "dmPolicy": "allowlist",
                "allowFrom": [680349125]
              }
            },
            "tools": {
              "profile": "minimal",
              "allow": ["web.search"],
              "web": {
                "search": {
                  "enabled": true,
                  "provider": "duckduckgo"
                },
                "fetch": {
                  "enabled": false
                }
              }
            },
            "messages": {
              "tts": {
                "auto": "never",
                "provider": "microsoft"
              }
            }
          }
          EOF

          # ─── Exec Approvals (YOLO mode) ─────────────────────────────
          cat << 'EOF' > ~/.openclaw/exec-approvals.json
          {
            "version": 1,
            "defaults": {
              "security": "full",
              "ask": "off",
              "askFallback": "full"
            }
          }
          EOF

      - name: Install Cloudflare Tunnel (cloudflared)
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start OpenClaw Gateway
        run: |
          nohup openclaw gateway --port 18789 --verbose > openclaw.log 2>&1 &

          echo "⏳ Waiting for OpenClaw Gateway to boot..."
          for i in {1..30}; do
            if openclaw gateway status 2>/dev/null | grep -q "running"; then
              echo "✅ Gateway successfully booted!"
              openclaw gateway status
              break
            fi
            sleep 2
          done

      - name: Start Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --url http://127.0.0.1:18789 > cloudflared.log 2>&1 &

          echo "⏳ Waiting for Cloudflare Tunnel to generate public link..."
          sleep 15

          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflared.log | head -n 1)

          if [ -n "$TUNNEL_URL" ]; then
            echo "=========================================================================="
            echo "🚀 OPENCLAW GATEWAY IS LIVE!"
            echo "🔗 Dashboard : $TUNNEL_URL"
            echo "🔑 Auth Token: openclaw-github-actions-secure-token-2026"
            echo "🤖 Model     : openrouter/google/gemini-2.0-flash-exp:free"
            echo "⏱️  Duration  : ${{ inputs.duration }} hour(s)"
            echo "=========================================================================="
          else
            echo "⚠️ Could not retrieve Cloudflare Tunnel URL automatically."
            echo "Checking cloudflared logs:"
            tail -n 30 cloudflared.log
            exit 1
          fi

      - name: Keep-Alive Daemon & Auto-Device Approver
        run: |
          HOURS=${{ inputs.duration }}
          if [ "$HOURS" -gt 6 ]; then
            HOURS=6
          fi
          TOTAL_SECONDS=$((HOURS * 3600))
          ELAPSED_SECONDS=0

          echo "🔄 Keeping runner alive for $HOURS hour(s)..."
          echo "👀 Monitoring for incoming browser pairing requests..."

          while [ $ELAPSED_SECONDS -lt $TOTAL_SECONDS ]; do
            # Auto-approve pending device pairing requests
            PENDING_ID=$(openclaw devices list 2>/dev/null | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n 1)

            if [ -n "$PENDING_ID" ]; then
              echo "🔒 [Auto-Auth] Detected connection request ID: $PENDING_ID"
              openclaw devices approve "$PENDING_ID"
              echo "✅ [Auto-Auth] Device successfully paired!"
            fi

            # Log heartbeat every 5 minutes
            if [ $((ELAPSED_SECONDS % 300)) -eq 0 ]; then
              REMAINING=$(( (TOTAL_SECONDS - ELAPSED_SECONDS) / 60 ))
              echo "💓 [Heartbeat] Still alive — $REMAINING min remaining"
            fi

            sleep 30
            ELAPSED_SECONDS=$((ELAPSED_SECONDS + 30))
          done

          echo "⏰ Time's up! Shutting down gracefully..."
          openclaw gateway stop 2>/dev/null || true
