name: OpenClaw Telegram Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GATEWAY_AUTH_TOKEN: ${{ secrets.GATEWAY_AUTH_TOKEN }}
      ADMIN_TELEGRAM_ID: "680349125"
      OLLAMA_MODEL: "gemma4:e2b"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server in background
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -s http://localhost:11434 >/dev/null && break
            sleep 1
          done

      - name: Pull Gemma 4 (free, local, no API key)
        run: ollama pull "$OLLAMA_MODEL"

      - name: Install OpenClaw
        run: |
          curl -fsSL https://openclaw.ai/install.sh | bash

      - name: Write OpenClaw config
        run: |
          mkdir -p "$HOME/.openclaw"
          
          # Build gateway auth config dynamically based on token presence
          GATEWAY_AUTH_JSON='{"mode": "none"}'
          if [ -n "$GATEWAY_AUTH_TOKEN" ]; then
            GATEWAY_AUTH_JSON="{\"mode\": \"token\", \"token\": \"$GATEWAY_AUTH_TOKEN\"}"
          fi

          cat > "$HOME/.openclaw/openclaw.json" <<EOF
          {
            "gateway": {
              "mode": "local",
              "bind": "loopback",
              "port": 18789,
              "auth": $GATEWAY_AUTH_JSON
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "ollama/${OLLAMA_MODEL}"
                },
                "models": {
                  "ollama/${OLLAMA_MODEL}": {
                    "alias": "gemma"
                  }
                }
              }
            },
            "models": {
              "mode": "merge",
              "providers": {
                "ollama": {
                  "baseUrl": "http://127.0.0.1:11434",
                  "apiKey": "ollama-local"
                }
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "botToken": "${TELEGRAM_BOT_TOKEN}",
                "dmPolicy": "allowlist",
                "allowFrom": ["${ADMIN_TELEGRAM_ID}"],
                "groupAllowFrom": ["${ADMIN_TELEGRAM_ID}"]
              }
            },
            "plugins": {
              "entries": {
                "ollama": {
                  "enabled": true
                }
              }
            },
            "commands": {
              "ownerAllowFrom": ["telegram:${ADMIN_TELEGRAM_ID}"]
            }
          }
EOF

      - name: Run openclaw gateway
        run: |
          nohup openclaw gateway > /tmp/openclaw.log 2>&1 &
          
          echo "Waiting for OpenClaw Gateway to start..."
          SUCCESS=false
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:18789/health >/dev/null 2>&1 || curl -s http://127.0.0.1:18789 >/dev/null 2>&1; then
              echo "OpenClaw Gateway started successfully!"
              SUCCESS=true
              break
            fi
            sleep 1
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "Error: OpenClaw Gateway failed to start. Tail of /tmp/openclaw.log:"
            tail -n 50 /tmp/openclaw.log
            exit 1
          fi

      - name: Keep workflow running
        run: |
          echo "Bot is now active on Telegram. Keeping runner alive..."
          tail -f /tmp/openclaw.log
