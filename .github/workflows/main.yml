name: OpenClaw CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-openclaw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 1: Clean up pre-installed software to reclaim ~20GB of disk space
      - name: Free Disk Space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "Disk space after cleanup:"
          df -h

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install dependencies using "npm install" 
      # (This dynamically creates a lockfile and will not fail if package-lock.json is missing)
      - name: Install Project Dependencies
        run: npm install

      # Step 4: Install Ollama
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      # Step 5: Spin up Ollama and Pull the Gemma 4 Edge Model
      - name: Start Ollama & Pull Model
        run: |
          # Start the Ollama server in the background
          ollama serve &
          
          # Wait for the Ollama server to respond
          echo "Waiting for Ollama to start..."
          until curl -s http://localhost:11434/ > /dev/null; do
            sleep 2
          done
          echo "Ollama is running!"
          
          # Pull the resource-friendly Gemma 4 Edge model
          ollama pull gemma4:e4b

      # Step 6: Run your application / test suite
      - name: Run OpenClaw
        env:
          OLLAMA_HOST: http://localhost:11434
        run: npm test
